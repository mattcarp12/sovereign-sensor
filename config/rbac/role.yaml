---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - sec.sovereign.io
  resources:
  - sovereigntypolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sec.sovereign.io
  resources:
  - sovereigntypolicies/finalizers
  verbs:
  - update
- apiGroups:
  - sec.sovereign.io
  resources:
  - sovereigntypolicies/status
  verbs:
  - get
  - patch
  - update
